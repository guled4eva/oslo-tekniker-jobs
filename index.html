<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oslo Tekniker Samfund – Stillinger</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-light: #E6F1FB;
    --blue-mid: #378ADD;
    --blue-dark: #0C447C;
    --green-light: #EAF3DE;
    --green-mid: #639922;
    --green-dark: #3B6D11;
    --purple-light: #EEEDFE;
    --purple-mid: #7F77DD;
    --purple-dark: #3C3489;
    --teal-light: #E1F5EE;
    --teal-mid: #1D9E75;
    --teal-dark: #085041;
    --coral-light: #FAECE7;
    --coral-mid: #D85A30;
    --coral-dark: #712B13;
    --amber-light: #FAEEDA;
    --amber-mid: #BA7517;
    --amber-dark: #633806;
    --bg: #F7F5F0;
    --card: #ffffff;
    --text: #1a1a18;
    --text-muted: #6b6b67;
    --border: rgba(0,0,0,0.1);
    --border-hover: rgba(0,0,0,0.18);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-mark {
    width: 40px;
    height: 40px;
    background: #0C447C;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #E6F1FB;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .logo-text { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); }
  .logo-sub { font-size: 12px; color: var(--text-muted); margin-top: -2px; }

  .header-add-btn {
    padding: 9px 20px;
    background: #185FA5;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background .15s;
  }
  .header-add-btn:hover { background: #0C447C; }

  /* ── Hero ── */
  .hero {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 2.5rem 2rem 2rem;
  }
  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    font-weight: 400;
    margin-bottom: 6px;
    color: var(--text);
  }
  .hero p { color: var(--text-muted); font-size: 14px; }

  /* ── Filters ── */
  .filters {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-label { font-size: 12px; color: var(--text-muted); margin-right: 4px; text-transform: uppercase; letter-spacing: .5px; }

  .bubble {
    padding: 6px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: #fff;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    transition: all .15s;
  }
  .bubble:hover { border-color: var(--border-hover); color: var(--text); }
  .bubble.active-all { background: var(--text); color: #fff; border-color: var(--text); }
  .bubble.active-be { background: var(--blue-light); border-color: var(--blue-mid); color: var(--blue-dark); }
  .bubble.active-mek { background: var(--green-light); border-color: var(--green-mid); color: var(--green-dark); }
  .bubble.active-it { background: var(--purple-light); border-color: var(--purple-mid); color: var(--purple-dark); }

  /* ── Main ── */
  main { padding: 2rem; max-width: 1200px; margin: 0 auto; }

  .section { margin-bottom: 2.5rem; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
  }
  .section-super {
    padding: 3px 12px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .super-be { background: var(--blue-light); color: var(--blue-dark); }
  .super-mek { background: var(--green-light); color: var(--green-dark); }
  .super-it { background: var(--purple-light); color: var(--purple-dark); }

  .section-name {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }
  .section-count {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .jobs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .job-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
    position: relative;
    transition: border-color .15s, box-shadow .15s;
  }
  .job-card:hover { border-color: var(--border-hover); box-shadow: 0 2px 12px rgba(0,0,0,.06); }

  .card-dept-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 10px;
    border-radius: 100px;
    margin-bottom: 8px;
  }
  .tag-bygg { background: var(--blue-light); color: var(--blue-dark); }
  .tag-energi { background: var(--teal-light); color: var(--teal-dark); }
  .tag-maskin { background: var(--green-light); color: var(--green-dark); }
  .tag-elektro { background: var(--purple-light); color: var(--purple-dark); }
  .tag-kjemi { background: var(--coral-light); color: var(--coral-dark); }
  .tag-it { background: var(--amber-light); color: var(--amber-dark); }

  .job-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .job-company { font-size: 13px; color: var(--text-muted); }
  .job-location { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .job-desc { font-size: 13px; color: var(--text-muted); margin-top: 8px; line-height: 1.5; border-top: 1px solid var(--border); padding-top: 8px; }

  .job-delete {
    position: absolute;
    top: 10px; right: 10px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 18px;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 6px;
    opacity: 0;
    transition: opacity .15s;
    font-family: sans-serif;
  }
  .job-card:hover .job-delete { opacity: 1; }
  .job-delete:hover { background: #fef2f2; color: #b91c1c; }

  .add-card {
    background: none;
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    transition: all .15s;
    text-align: left;
    width: 100%;
  }
  .add-card:hover { border-color: var(--border-hover); color: var(--text); background: rgba(0,0,0,.02); }
  .add-icon { font-size: 20px; line-height: 1; }

  .empty-state {
    text-align: center;
    padding: 2rem;
    color: var(--text-muted);
    font-size: 13px;
    border: 1px dashed var(--border);
    border-radius: 12px;
    grid-column: 1/-1;
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 200;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 1rem 2rem;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 1.75rem;
    width: 500px;
    max-width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,.12);
  }
  .modal h2 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; margin-bottom: 1.5rem; }

  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: #378ADD; }
  .field textarea { resize: vertical; min-height: 80px; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem; }
  .btn-primary {
    padding: 10px 22px;
    background: #185FA5;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-primary:hover { background: #0C447C; }
  .btn-cancel {
    padding: 10px 22px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    color: var(--text);
    transition: background .15s;
  }
  .btn-cancel:hover { background: var(--bg); }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 2rem;
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    background: #fff;
    margin-top: 2rem;
  }

  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    .hero { padding: 1.5rem 1rem 1rem; }
    .filters { padding: .75rem 1rem; }
    main { padding: 1.25rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">OTS</div>
    <div>
      <div class="logo-text">Oslo Tekniker Samfund</div>
      <div class="logo-sub">Stillingsportal</div>
    </div>
  </div>
  <button class="header-add-btn" onclick="openModal(null)">+ Legg til stilling</button>
</header>

<div class="hero">
  <h1>Ledige stillinger</h1>
  <p>Ingeniørstillinger innen bygg, energi, maskin, elektro, kjemi og IT/data</p>
</div>

<div class="filters">
  <span class="filter-label">Filtrer:</span>
  <button class="bubble active-all" onclick="setFilter('all',this)">Alle stillinger</button>
  <button class="bubble" onclick="setFilter('BE',this)">BE</button>
  <button class="bubble" onclick="setFilter('MEK',this)">MEK</button>
  <button class="bubble" onclick="setFilter('IT',this)">IT/DATA</button>
</div>

<main id="main"></main>

<footer>© Oslo Tekniker Samfund</footer>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Legg til ny stilling</h2>
    <div class="field">
      <label>Stillingstittel *</label>
      <input type="text" id="f-title" placeholder="f.eks. Konstruksjonsingeniør">
    </div>
    <div class="field">
      <label>Faggruppe *</label>
      <select id="f-dept">
        <option value="">— velg faggruppe —</option>
        <optgroup label="BYGG (BE)">
          <option value="Konstruksjon|bygg|be">Konstruksjonsteknikk</option>
          <option value="By- og transportplanlegging|bygg|be">By- og transportplanlegging</option>
          <option value="Vann- og miljøteknikk|bygg|be">Vann- og miljøteknikk</option>
        </optgroup>
        <optgroup label="ENERGI/MILJØ (BE)">
          <option value="Energi og miljø|energi|be">Energi og miljø</option>
        </optgroup>
        <optgroup label="MASKIN (MEK)">
          <option value="Mekatronikk|maskin|mek">Mekatronikk</option>
          <option value="Konstruksjon og design|maskin|mek">Konstruksjon og design</option>
        </optgroup>
        <optgroup label="ELEKTRO (MEK)">
          <option value="Automatisering og robotikk|elektro|mek">Automatisering og robotikk</option>
          <option value="Elektronikk|elektro|mek">Elektronikk</option>
        </optgroup>
        <optgroup label="KJEMI (MEK)">
          <option value="Bioteknologi|kjemi|mek">Bioteknologi</option>
          <option value="Kjemiingeniør|kjemi|mek">Kjemiingeniør</option>
        </optgroup>
        <optgroup label="IT/DATA">
          <option value="Anvendt datateknologi|it|it">Anvendt datateknologi</option>
          <option value="Dataingeniør|it|it">Dataingeniør</option>
          <option value="Informasjonsteknologi|it|it">Informasjonsteknologi</option>
          <option value="Matematisk modellering og datavitenskap|it|it">Matematisk modellering og datavitenskap – ingeniør</option>
        </optgroup>
      </select>
    </div>
    <div class="field">
      <label>Bedrift</label>
      <input type="text" id="f-company" placeholder="f.eks. Multiconsult AS">
    </div>
    <div class="field">
      <label>Sted</label>
      <input type="text" id="f-location" placeholder="f.eks. Oslo">
    </div>
    <div class="field">
      <label>Beskrivelse</label>
      <textarea id="f-desc" placeholder="Kort beskrivelse av stillingen..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Avbryt</button>
      <button class="btn-primary" onclick="saveJob()">Legg til stilling</button>
    </div>
  </div>
</div>

<script>
const SECTIONS = [
  { id:'bygg',   group:'be',  label:'BYGG',        superClass:'super-be',  tagClass:'tag-bygg',   depts:['Konstruksjon','By- og transportplanlegging','Vann- og miljøteknikk'] },
  { id:'energi', group:'be',  label:'ENERGI/MILJØ', superClass:'super-be',  tagClass:'tag-energi', depts:['Energi og miljø'] },
  { id:'maskin', group:'mek', label:'MASKIN',       superClass:'super-mek', tagClass:'tag-maskin', depts:['Mekatronikk','Konstruksjon og design'] },
  { id:'elektro',group:'mek', label:'ELEKTRO',      superClass:'super-mek', tagClass:'tag-elektro',depts:['Automatisering og robotikk','Elektronikk'] },
  { id:'kjemi',  group:'mek', label:'KJEMI',        superClass:'super-mek', tagClass:'tag-kjemi',  depts:['Bioteknologi','Kjemiingeniør'] },
  { id:'it',     group:'it',  label:'IT/DATA',      superClass:'super-it',  tagClass:'tag-it',     depts:['Anvendt datateknologi','Dataingeniør','Informasjonsteknologi','Matematisk modellering og datavitenskap'] },
];

const GROUP_LABELS = { be:'BE', mek:'MEK', it:'IT/DATA' };

let jobs = JSON.parse(localStorage.getItem('ots-jobs') || '[]');
let nextId = parseInt(localStorage.getItem('ots-next-id') || '1');
let activeFilter = 'all';
let pendingSection = null;

function save() {
  localStorage.setItem('ots-jobs', JSON.stringify(jobs));
  localStorage.setItem('ots-next-id', nextId);
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.bubble').forEach(b => {
    b.className = 'bubble';
  });
  if (f === 'all') el.classList.add('active-all');
  else if (f === 'BE') el.classList.add('active-be');
  else if (f === 'MEK') el.classList.add('active-mek');
  else if (f === 'IT') el.classList.add('active-it');
  render();
}

function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  SECTIONS.forEach(sec => {
    const gKey = GROUP_LABELS[sec.group];
    if (activeFilter !== 'all' && activeFilter !== gKey) return;
    const secJobs = jobs.filter(j => j.section === sec.id);
    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `
      <div class="section-header">
        <span class="section-super ${sec.superClass}">${gKey}</span>
        <span class="section-name">${sec.label}</span>
        <span class="section-count">${secJobs.length} stilling${secJobs.length !== 1 ? 'er' : ''}</span>
      </div>
      <div class="jobs-grid" id="grid-${sec.id}"></div>`;
    main.appendChild(section);
    const grid = section.querySelector(`#grid-${sec.id}`);
    if (secJobs.length === 0) {
      grid.innerHTML = `<div class="empty-state">Ingen ledige stillinger ennå</div>`;
    } else {
      secJobs.forEach(job => {
        const card = document.createElement('div');
        card.className = 'job-card';
        card.innerHTML = `
          <button class="job-delete" onclick="deleteJob(${job.id})" title="Fjern">×</button>
          <span class="card-dept-tag ${sec.tagClass}">${job.dept}</span>
          <div class="job-title">${job.title}</div>
          <div class="job-company">${job.company || ''}</div>
          <div class="job-location">${job.location ? '📍 ' + job.location : ''}</div>
          ${job.desc ? `<div class="job-desc">${job.desc}</div>` : ''}`;
        grid.appendChild(card);
      });
    }
    const addCard = document.createElement('button');
    addCard.className = 'add-card';
    addCard.innerHTML = `<span class="add-icon">+</span> Legg til i ${sec.label}`;
    addCard.onclick = () => openModal(sec.id);
    grid.appendChild(addCard);
  });
}

function openModal(sectionId) {
  pendingSection = sectionId;
  if (sectionId) {
    const sec = SECTIONS.find(s => s.id === sectionId);
    if (sec) {
      const sel = document.getElementById('f-dept');
      for (let o of sel.options) {
        if (o.value && o.value.split('|')[1] === sec.id) { sel.value = o.value; break; }
      }
    }
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  ['f-title','f-company','f-location','f-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-dept').value = '';
  pendingSection = null;
}

function saveJob() {
  const title = document.getElementById('f-title').value.trim();
  const deptVal = document.getElementById('f-dept').value;
  if (!title || !deptVal) { alert('Stillingstittel og faggruppe er påkrevd.'); return; }
  const [dept, sectionId, groupKey] = deptVal.split('|');
  jobs.push({
    id: nextId++,
    title,
    dept,
    section: sectionId,
    group: groupKey,
    company: document.getElementById('f-company').value.trim(),
    location: document.getElementById('f-location').value.trim() || 'Oslo',
    desc: document.getElementById('f-desc').value.trim()
  });
  save();
  closeModal();
  render();
}

function deleteJob(id) {
  if (!confirm('Fjerne denne stillingen?')) return;
  jobs = jobs.filter(j => j.id !== id);
  save();
  render();
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

render();
</script>
</body>
</html>
