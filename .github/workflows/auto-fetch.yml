name: Auto-fetch from Arbeidsplassen

on:
  schedule:
    - cron: '0 14 * * *'  # 15:00 Oslo time (UTC+1), 14:00 UTC
  workflow_dispatch:       # also allows manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch

      - name: Fetch and categorize jobs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node auto-fetch-runner.js

      - name: Commit jobs.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase
          git add jobs.json
          git diff --staged --quiet || git commit -m "Auto-fetch jobs from Arbeidsplassen"
          git push
