name: Fetch Job from URL

on:
  repository_dispatch:
    types: [fetch-job]

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch cheerio

      - name: Fetch and parse job
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JOB_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          node << 'EOF'
          const fetch = (await import('node-fetch')).default;
          const cheerio = (await import('cheerio')).load;
          const fs = require('fs');

          const payload = JSON.parse(process.env.JOB_PAYLOAD);
          const { url, id, posted, manualText } = payload;

          let pageText = '';
          try {
            const res = await fetch(url, {
              headers: {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                'Accept-Language': 'no,nb;q=0.9,en;q=0.8',
              },
              timeout: 12000
            });
            const html = await res.text();
            const $ = cheerio(html);
            $('script, style, nav, footer, header, iframe, noscript').remove();
            pageText = $('body').text().replace(/\s+/g, ' ').trim().slice(0, 8000);
          } catch (e) {
            console.log('Could not fetch page:', e.message);
          }

          const combinedText = [manualText, pageText].filter(Boolean).join('\n\n').slice(0, 8000);

          const allDepts = [
            { dept: 'Konstruksjonsteknikk', section: 'bygg', group: 'be' },
            { dept: 'By- og transportplanlegging', section: 'bygg', group: 'be' },
            { dept: 'Vann- og miljøteknikk', section: 'bygg', group: 'be' },
            { dept: 'Energi og miljø', section: 'energi', group: 'be' },
            { dept: 'Mekatronikk', section: 'maskin', group: 'mek' },
            { dept: 'Konstruksjon og design', section: 'maskin', group: 'mek' },
            { dept: 'Automatisering og robotikk', section: 'elektro', group: 'mek' },
            { dept: 'Elektronikk', section: 'elektro', group: 'mek' },
            { dept: 'Bioteknologi', section: 'kjemi', group: 'mek' },
            { dept: 'Kjemiingeniør', section: 'kjemi', group: 'mek' },
            { dept: 'Anvendt datateknologi', section: 'it', group: 'it' },
            { dept: 'Dataingeniør', section: 'it', group: 'it' },
            { dept: 'Informasjonsteknologi', section: 'it', group: 'it' },
            { dept: 'Matematisk modellering og datavitenskap – ingeniør', section: 'it', group: 'it' },
          ];

          const deptList = allDepts.map(d => `- ${d.dept}`).join('\n');

          const prompt = `You are helping categorize a Norwegian engineering job posting for Oslo Tekniker Samfund, a student engineering organization.

Job URL: ${url}
Job page content: ${combinedText || 'Could not fetch page - use the URL to make your best guess'}

Available faggrupper (departments):
${deptList}

Extract all job information and determine which faggruppe(r) this job belongs to. A job can belong to multiple faggrupper if relevant.

Return ONLY valid JSON with no markdown formatting, no code blocks, no explanation:
{
  "title": "job title",
  "company": "company name",
  "location": "city or location in Norway",
  "deadline": "YYYY-MM-DD or empty string if not found",
  "description": "full job description max 800 words, preserve paragraphs with \\n\\n",
  "sections": ["exact dept name from list"]
}

Rules:
- sections must contain ONLY exact names from the list above
- Pick 1-3 most relevant departments
- If unsure between two, include both
- description should be in the same language as the job posting`;

          const geminiRes = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { temperature: 0.1 }
              })
            }
          );

          const geminiData = await geminiRes.json();
          const raw = geminiData.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
          const clean = raw.replace(/```json|```/g, '').trim();

          let extracted = {};
          try { extracted = JSON.parse(clean); } catch(e) { console.log('Parse error:', e.message); }

          const resolvedSections = (extracted.sections || [])
            .map(deptName => allDepts.find(d => d.dept === deptName))
            .filter(Boolean)
            .map(d => ({ dept: d.dept, section: d.section, group: d.group }));

          if (resolvedSections.length === 0) {
            resolvedSections.push({ dept: 'Dataingeniør', section: 'it', group: 'it' });
          }

          let jobs = [];
          try { jobs = JSON.parse(fs.readFileSync('jobs.json', 'utf8')); } catch(e) {}
          jobs = jobs.filter(j => j.id !== id);

          const newJob = {
            id,
            title: extracted.title || 'Ukjent stilling',
            company: extracted.company || '',
            location: extracted.location || 'Oslo',
            deadline: extracted.deadline || '',
            desc: extracted.description || '',
            sections: resolvedSections,
            url,
            posted
          };

          jobs.push(newJob);
          fs.writeFileSync('jobs.json', JSON.stringify(jobs, null, 2));
          console.log('Saved:', newJob.title, '| Depts:', resolvedSections.map(s=>s.dept).join(', '));
          EOF

      - name: Commit jobs.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add jobs.json
          git diff --staged --quiet || git commit -m "Add job: ${{ github.event.client_payload.id }}"
          git push
