name: Fetch Job from URL

on:
  push:
    paths:
      - 'pending-job.json'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch

      - name: Parse job with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node fetch-job-runner.js

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase
          git rm --ignore-unmatch pending-job.json
          git add jobs.json
          git diff --staged --quiet || git commit -m "Add job from pending-job.json"
          git push
